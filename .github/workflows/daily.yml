name: Entrackr Daily Funding Fetch

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST every day
  workflow_dispatch:         # lets you trigger manually from GitHub UI anytime

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install feedparser requests

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: ollama serve &

      - name: Wait for Ollama to be ready
        run: sleep 8

      - name: Pull model
        run: ollama pull llama3.1:8b

      - name: Run extractor
        run: python entrackr_extractor.py

      - name: Upload JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: entrackr-funding-${{ github.run_id }}
          path: entrackr_funding_*.json
          retention-days: 30   # keeps files for 30 days
